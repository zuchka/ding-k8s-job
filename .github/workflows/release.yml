name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write   # for cosign keyless

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Verify Chart.yaml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          if [ "$TAG_VERSION" != "$CHART_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Chart.yaml version $CHART_VERSION"
            exit 1
          fi

      - name: Package chart
        run: helm package . --destination ./dist

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push chart to OCI registry
        run: |
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          helm push "./dist/ding-k8s-job-${CHART_VERSION}.tgz" oci://ghcr.io/zuchka

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the chart artifact (keyless)
        # cosign 2.x resolves the tag to a digest internally — no separate
        # `crane digest` step needed. If you need to inspect the digest for
        # logs/release notes, add `imjasonh/setup-crane@v0.3` before this step.
        run: |
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          cosign sign --yes "ghcr.io/zuchka/ding-k8s-job:${CHART_VERSION}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./dist/*.tgz
