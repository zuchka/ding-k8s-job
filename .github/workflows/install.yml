name: Install on kind

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ["v1.28.9", "v1.29.4", "v1.30.0"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          node_image: "kindest/node:${{ matrix.k8s-version }}"
          wait: 120s

      - name: Install — basic Job
        run: |
          helm install ci-basic . -f ci/basic-values.yaml --wait --timeout 5m
          kubectl wait --for=condition=Complete job/ci-basic --timeout=120s
          helm uninstall ci-basic --wait

      - name: Install — CronJob
        run: |
          helm install ci-cron . -f ci/cronjob-values.yaml --wait --timeout 5m
          # Wait up to 90s for first Job to be created and complete
          for i in {1..18}; do
            JOB=$(kubectl get jobs -l app.kubernetes.io/instance=ci-cron -o name 2>/dev/null | head -1)
            if [ -n "$JOB" ]; then
              kubectl wait --for=condition=Complete "$JOB" --timeout=60s && break
            fi
            sleep 5
          done
          helm uninstall ci-cron --wait

      - name: Install — existingSecret
        run: |
          kubectl create secret generic ci-test-secret \
            --from-literal=WEBHOOK_URL=http://localhost:9999/fake
          helm install ci-existing . -f ci/existingsecret-values.yaml --wait --timeout 5m
          kubectl wait --for=condition=Complete job/ci-existing --timeout=120s
          helm uninstall ci-existing --wait
          kubectl delete secret ci-test-secret
