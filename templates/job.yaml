{{- if eq .Values.kind "Job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ding-k8s-job.fullname" . }}
  labels:
    {{- include "ding-k8s-job.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  {{- with .Values.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  {{- with .Values.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ . }}
  {{- end }}
  template:
    {{- include "ding-k8s-job.podSpec" . | nindent 4 }}
{{- else if eq .Values.kind "CronJob" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "ding-k8s-job.fullname" . }}
  labels:
    {{- include "ding-k8s-job.labels" . | nindent 4 }}
spec:
  schedule: {{ required "schedule is required when kind=CronJob" .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  suspend: {{ .Values.suspend }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      {{- with .Values.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      {{- with .Values.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      template:
        {{- include "ding-k8s-job.podSpec" . | nindent 8 }}
{{- else }}
{{- fail (printf "kind must be Job or CronJob, got: %s" .Values.kind) }}
{{- end }}
