{{- include "ding-k8s-job.validate" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ding-k8s-job.fullname" . }}-config
  labels:
    {{- include "ding-k8s-job.labels" . | nindent 4 }}
data:
  ding.yaml: |
    server:
      drain_timeout: {{ .Values.ding.drainTimeout }}
    notifiers:
      {{- if .Values.slack.webhookUrl }}
      slack:
        type: slack
        url: ${SLACK_WEBHOOK_URL}
      {{- end }}
      {{- with .Values.extraNotifiers }}
      {{/* String branch handles `--set-file extraNotifiers=path` (Helm passes file content as string). Map branch handles `-f`/`--set`. */}}
      {{- if kindIs "string" . }}
      {{- fromYaml . | toYaml | nindent 6 }}
      {{- else }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- end }}
    rules:
      {{- if empty .Values.rules }}
      - name: job_failed
        match:
          metric: run.exit
        condition: value != 0
        mode: end-of-run
        {{/* Below: backtick-string-literal escape so Helm emits DING's {{ "{{" }} ... {{ "}}" }} syntax verbatim. Do NOT switch to printf — mixing styles silently mis-renders. */}}
        message: "{{`{{ .pod }} (Job {{ .job_name }}) failed with exit {{ .exit_code }}`}}"
        alert:
          - notifier: slack
      {{- else }}
      {{/* Same `--set-file` handling as extraNotifiers above. */}}
      {{- if kindIs "string" .Values.rules }}
      {{- fromYamlArray .Values.rules | toYaml | nindent 6 }}
      {{- else }}
      {{- toYaml .Values.rules | nindent 6 }}
      {{- end }}
      {{- end }}
