# Workload — what `ding run --` wraps. Required.
image:
  repository: "REQUIRED-set-image-repository-or-chart-fails"
  tag: "REQUIRED-set-image-tag-or-chart-fails"
  pullPolicy: IfNotPresent

command: []
args: []

# DING wrapper container — the initContainer that copies /ding into the Pod.
ding:
  image:
    repository: ghcr.io/zuchka/ding
    tag: ""              # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  drainTimeout: 30s

# Slack first-class shortcut — chart creates a Secret with key SLACK_WEBHOOK_URL.
slack:
  webhookUrl: ""

# Production: pre-provisioned Secret reference. Mutually exclusive with slack.webhookUrl.
existingSecret: ""

# Arbitrary notifier passthrough — keys merge into ding.yaml's notifiers: block.
extraNotifiers: {}

# Rules — if non-empty, fully replaces the default job_failed rule.
rules: []

# K8s structure
kind: Job
backoffLimit: 0
restartPolicy: Never
terminationGracePeriodSeconds: 60

ttlSecondsAfterFinished: null   # Job auto-cleanup; null = no TTL
activeDeadlineSeconds: null     # Job timeout; null = no deadline

# CronJob — only used when kind=CronJob
schedule: ""                # required if kind=CronJob, e.g. "0 2 * * *"
concurrencyPolicy: Forbid
suspend: false
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1
