image:
  repository: alpine
  tag: "3"
command: ["sh", "-c", "echo 'workload'; sleep 1; exit 0"]
existingSecret: ci-test-secret
extraNotifiers:
  webhook-fake:
    type: webhook
    url: ${WEBHOOK_URL}
# Override default rules — the chart's default "job_failed" rule references the
# `slack` notifier, which isn't rendered when slack.webhookUrl is empty. Point
# it at webhook-fake (defined above) so DING's config load succeeds.
rules:
  - name: job_failed
    match:
      metric: run.exit
    condition: value != 0
    mode: end-of-run
    message: "Job failed (existingSecret CI test)"
    alert:
      - notifier: webhook-fake
