kind: CronJob
schedule: "*/1 * * * *"   # every minute — first spawn happens within 60s
image:
  repository: alpine
  tag: "3"
command: ["sh", "-c", "echo 'cron run'; sleep 1; exit 0"]
slack:
  webhookUrl: "https://hooks.slack.com/services/CI-FAKE/CI-FAKE/CI-FAKE"
# DING image published with v-prefix; appVersion ("0.5.0") would resolve to a
# non-existent tag without this override.
ding:
  image:
    tag: "v0.5.0"
