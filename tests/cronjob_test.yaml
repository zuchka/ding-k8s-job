suite: CronJob rendering
templates:
  - templates/job.yaml

tests:
  - it: renders a CronJob (not Job) when kind=CronJob
    set:
      kind: CronJob
      schedule: "0 2 * * *"
      image.repository: my-app
      image.tag: v1.2.3
      command: ["python", "batch.py"]
      slack.webhookUrl: "https://hooks.slack.com/services/T0/B0/abc"
    asserts:
      - equal:
          path: kind
          value: CronJob
      - equal:
          path: apiVersion
          value: batch/v1
      - equal:
          path: spec.schedule
          value: "0 2 * * *"
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 3
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 1
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 0
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[0]
          value: /shared/ding
      - equal:
          path: spec.jobTemplate.spec.template.spec.terminationGracePeriodSeconds
          value: 60

  - it: fails to render when kind=CronJob and schedule is empty
    set:
      kind: CronJob
      schedule: ""
      image.repository: my-app
      image.tag: v1.2.3
      command: ["python", "batch.py"]
      slack.webhookUrl: "https://hooks.slack.com/services/T0/B0/abc"
    asserts:
      - failedTemplate:
          errorMessage: "schedule is required when kind=CronJob"
